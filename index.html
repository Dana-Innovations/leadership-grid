<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SONANCE Leadership Grid</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  :root {
    --black: #000000;
    --dark: #0a0a0a;
    --dark-surface: #111111;
    --dark-card: #1a1a1a;
    --dark-border: #2a2a2a;
    --cyan: #00AEEF;
    --cyan-dim: rgba(0,174,239,0.15);
    --cyan-glow: rgba(0,174,239,0.3);
    --orange: #E85A2A;
    --orange-dim: rgba(232,90,42,0.15);
    --white: #ffffff;
    --gray-100: #f5f5f5;
    --gray-300: #b0b0b0;
    --gray-500: #666666;
    --gray-700: #333333;
    --green: #2ECC71;
    --green-dim: rgba(46,204,113,0.15);
    --yellow: #F1C40F;
    --yellow-dim: rgba(241,196,15,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--black);
    color: var(--white);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== NAVIGATION ===== */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(0,0,0,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--dark-border);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-brand {
    font-weight: 800;
    font-size: 0.8rem;
    letter-spacing: 0.35em;
    color: var(--white);
    flex-shrink: 0;
  }

  .nav-brand span { color: var(--cyan); }

  .nav-tabs {
    display: flex;
    gap: 0;
    height: 100%;
    align-items: stretch;
  }

  .nav-tab {
    background: none;
    border: none;
    color: var(--gray-500);
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 0 1rem;
    cursor: pointer;
    transition: all 0.3s;
    border-bottom: 2px solid transparent;
    display: flex;
    align-items: center;
    white-space: nowrap;
  }

  .nav-tab:hover { color: var(--gray-300); }
  .nav-tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }

  .mobile-menu-btn {
    display: none;
    background: none;
    border: none;
    color: var(--white);
    font-size: 1.5rem;
    cursor: pointer;
  }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 60px; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.98);
    z-index: 99;
    padding: 2rem;
    flex-direction: column;
    gap: 0.5rem;
  }

  .mobile-menu.open { display: flex; }
  .mobile-menu .nav-tab {
    padding: 1rem;
    font-size: 1rem;
    border-bottom: none;
    border-left: 3px solid transparent;
  }
  .mobile-menu .nav-tab.active { border-left-color: var(--cyan); }

  @media (max-width: 1024px) {
    .nav-tabs { display: none; }
    .mobile-menu-btn { display: block; }
  }

  /* ===== MAIN ===== */
  .main { padding-top: 60px; min-height: 100vh; }

  .section { display: none; animation: fadeIn 0.4s ease; }
  .section.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== PROGRESS ===== */
  .progress { position: fixed; bottom: 0; left: 0; right: 0; height: 3px; background: var(--dark-surface); z-index: 100; }
  .progress-bar { height: 100%; background: var(--cyan); transition: width 0.4s; }

  /* Nav arrows */
  .nav-arrows {
    position: fixed;
    bottom: 1.5rem;
    right: 2rem;
    display: flex;
    gap: 0.5rem;
    z-index: 100;
  }
  .nav-arrow {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--dark-surface);
    border: 1px solid var(--dark-border);
    color: var(--gray-300);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .nav-arrow:hover { background: var(--cyan); color: var(--black); border-color: var(--cyan); }
  .nav-arrow:disabled { opacity: 0.3; cursor: default; }
  .nav-arrow:disabled:hover { background: var(--dark-surface); color: var(--gray-300); border-color: var(--dark-border); }

  /* ===== HERO ===== */
  .hero {
    min-height: calc(100vh - 60px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 4rem 2rem;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at center, var(--cyan-dim) 0%, transparent 50%);
    animation: pulse 8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.1); }
  }

  .hero-content { position: relative; z-index: 1; max-width: 700px; }

  .hero-logo {
    font-size: 0.85rem;
    letter-spacing: 0.5em;
    color: var(--gray-500);
    margin-bottom: 2rem;
    font-weight: 600;
  }

  .hero h1 { font-size: 3.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 1.5rem; }
  .hero h1 .cyan { color: var(--cyan); }

  .hero-tagline {
    font-size: 1.15rem;
    color: var(--gray-300);
    margin-bottom: 3rem;
    font-weight: 300;
  }

  .hero-values { display: flex; gap: 3rem; justify-content: center; margin-bottom: 3rem; }

  .hero-value-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 2px solid var(--cyan);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    font-weight: 800;
    margin: 0 auto 0.6rem;
    color: var(--cyan);
  }

  .hero-value-label {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--cyan);
  }

  .hero-start-btn {
    background: var(--cyan);
    color: var(--black);
    border: none;
    padding: 0.9rem 2.5rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .hero-start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px var(--cyan-glow);
  }

  /* ===== PAGE HEADER ===== */
  .page-header {
    padding: 3rem 4rem 2rem;
    border-bottom: 1px solid var(--dark-border);
  }
  .page-header h2 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
  .page-header p { color: var(--gray-300); font-size: 0.95rem; max-width: 700px; }

  /* ===== OVERVIEW ===== */
  .overview-content { padding: 2.5rem 4rem; max-width: 900px; }
  .overview-content h3 {
    font-size: 1.2rem;
    color: var(--cyan);
    font-weight: 700;
    margin-bottom: 0.75rem;
    margin-top: 2rem;
  }
  .overview-content h3:first-child { margin-top: 0; }
  .overview-content p {
    font-size: 0.95rem;
    color: var(--gray-300);
    line-height: 1.7;
    margin-bottom: 1rem;
  }

  .what-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin: 1.5rem 0;
  }

  .what-card {
    background: var(--dark-surface);
    border: 1px solid var(--dark-border);
    border-radius: 10px;
    padding: 1.2rem;
    text-align: center;
  }
  .what-card .num { font-size: 1.8rem; font-weight: 800; color: var(--cyan); }
  .what-card .label { font-size: 0.8rem; color: var(--gray-300); margin-top: 0.3rem; }

  /* ===== FRAMEWORK ===== */
  .framework-section { padding: 2.5rem 4rem; }

  .framework-block { margin-bottom: 2.5rem; max-width: 800px; }
  .framework-block h3 {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--cyan);
    margin-bottom: 0.75rem;
  }
  .framework-block p {
    font-size: 0.95rem;
    color: var(--gray-300);
    line-height: 1.7;
    margin-bottom: 0.75rem;
  }

  .anti-patterns {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-top: 1rem;
  }
  .anti-card {
    background: var(--dark-surface);
    border: 1px solid var(--orange);
    border-radius: 10px;
    padding: 1.2rem;
  }
  .anti-card h4 { font-size: 0.85rem; color: var(--orange); font-weight: 700; margin-bottom: 0.4rem; }
  .anti-card p { font-size: 0.8rem; color: var(--gray-300); margin: 0; }

  .pillars-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-top: 1rem;
  }
  .pillar-card {
    background: var(--dark-surface);
    border: 1px solid var(--dark-border);
    border-radius: 10px;
    padding: 1.2rem;
    text-align: center;
  }
  .pillar-card h4 { font-size: 0.85rem; color: var(--cyan); font-weight: 700; margin-bottom: 0.3rem; }
  .pillar-card p { font-size: 0.78rem; color: var(--gray-500); margin: 0; }

  .levels-strip {
    display: flex;
    gap: 0;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 1rem;
  }
  .level-strip-item {
    flex: 1;
    padding: 1rem;
    text-align: center;
    background: var(--dark-surface);
    border-right: 1px solid var(--dark-border);
  }
  .level-strip-item:last-child { border-right: none; }
  .level-strip-item .lvl { font-size: 1.2rem; font-weight: 800; color: var(--cyan); }
  .level-strip-item .mandate { font-size: 0.72rem; color: var(--gray-300); font-weight: 500; }

  .rating-strip {
    display: flex;
    gap: 0;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 1rem;
  }
  .rating-strip-item {
    flex: 1;
    padding: 1rem;
    text-align: center;
    background: var(--dark-surface);
    border-right: 1px solid var(--dark-border);
  }
  .rating-strip-item:last-child { border-right: none; }
  .rating-strip-item .num { font-size: 1.6rem; font-weight: 800; }
  .rating-strip-item .label { font-size: 0.72rem; color: var(--gray-300); }
  .rating-strip-item:nth-child(1) .num { color: var(--orange); }
  .rating-strip-item:nth-child(2) .num { color: #E8A22A; }
  .rating-strip-item:nth-child(3) .num { color: var(--yellow); }
  .rating-strip-item:nth-child(4) .num { color: #8BC34A; }
  .rating-strip-item:nth-child(5) .num { color: var(--green); }

  /* ===== SCOPE GRID (Oakley-style) ===== */
  .scope-grid-wrap {
    padding: 2rem;
    overflow-x: auto;
  }

  .scope-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 2px;
    font-size: 0.82rem;
  }

  .scope-table thead th {
    background: var(--dark-surface);
    color: var(--cyan);
    font-weight: 700;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-align: center;
    padding: 1rem 0.8rem;
    border-bottom: 2px solid var(--cyan);
  }

  .scope-table thead th:first-child { text-align: left; width: 160px; }

  .scope-table tbody td {
    padding: 0.8rem 1rem;
    vertical-align: top;
    background: var(--dark-card);
    border-bottom: 1px solid rgba(42,42,42,0.5);
  }

  .scope-table .dim-cell {
    background: var(--dark-surface);
    font-weight: 700;
    font-size: 0.82rem;
    color: var(--cyan);
    vertical-align: middle;
    text-align: left;
    border-right: 2px solid rgba(0,174,239,0.3);
    min-width: 160px;
  }

  .scope-table .dim-cell .dim-sub {
    font-weight: 400;
    font-size: 0.7rem;
    color: var(--gray-500);
    display: block;
    margin-top: 0.2rem;
  }

  .scope-table .scope-cell {
    min-width: 170px;
    line-height: 1.6;
  }

  .scope-cell .sub-comp {
    display: block;
    color: var(--gray-100);
    font-size: 0.8rem;
    padding: 0.1rem 0;
  }

  .scope-cell .sub-comp.new-comp {
    color: var(--orange);
    font-weight: 600;
  }

  .scope-cell .sub-comp.new-comp::after {
    content: ' â';
    font-size: 0.65rem;
  }

  .scope-empty {
    color: var(--gray-700);
    font-style: italic;
    font-size: 0.75rem;
  }

  /* ===== ONE CLEAN GRID ===== */
  .clean-grid-wrap {
    padding: 2rem;
    overflow-x: auto;
  }

  .clean-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 2px;
    font-size: 0.82rem;
  }

  .clean-table thead th {
    background: var(--dark-surface);
    color: var(--cyan);
    font-weight: 700;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-align: center;
    padding: 1rem 0.8rem;
    border-bottom: 2px solid var(--cyan);
  }

  .clean-table thead th:first-child { text-align: left; width: 160px; }

  .clean-table tbody td {
    padding: 1rem 1.2rem;
    vertical-align: top;
    background: var(--dark-card);
    border-bottom: 1px solid rgba(42,42,42,0.5);
    line-height: 1.65;
  }

  .clean-table .dim-cell {
    background: var(--dark-surface);
    font-weight: 700;
    font-size: 0.82rem;
    color: var(--cyan);
    vertical-align: middle;
    text-align: left;
    border-right: 2px solid rgba(0,174,239,0.3);
    min-width: 160px;
  }

  .clean-table .dim-cell .dim-sub {
    font-weight: 400;
    font-size: 0.7rem;
    color: var(--gray-500);
    display: block;
    margin-top: 0.2rem;
  }

  .clean-table .narrative-cell {
    color: var(--gray-300);
    font-size: 0.82rem;
    min-width: 200px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
  }

  .clean-table .narrative-cell:hover {
    background: rgba(0,174,239,0.05);
  }

  .clean-table .narrative-cell.empty-cell {
    color: var(--gray-700);
    font-style: italic;
    cursor: default;
  }

  .clean-table .narrative-cell.empty-cell:hover { background: var(--dark-card); }

  /* ===== DRILL-DOWN MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    justify-content: center;
    align-items: center;
    padding: 2rem;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--dark-surface);
    border: 1px solid var(--dark-border);
    border-radius: 16px;
    max-width: 700px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 2.5rem;
  }

  .modal-close {
    float: right;
    background: none;
    border: none;
    color: var(--gray-500);
    font-size: 1.5rem;
    cursor: pointer;
    margin-top: -0.5rem;
  }
  .modal-close:hover { color: var(--white); }

  .modal h3 {
    font-size: 1.3rem;
    font-weight: 800;
    margin-bottom: 0.3rem;
  }

  .modal .modal-subtitle {
    color: var(--cyan);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    margin-bottom: 1.5rem;
  }

  .modal-section { margin-bottom: 1.5rem; }
  .modal-section h4 {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 0.6rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--dark-border);
  }

  .modal-section.rating-1 h4 { color: var(--orange); }
  .modal-section.rating-3 h4 { color: var(--yellow); }
  .modal-section.rating-5 h4 { color: var(--green); }
  .modal-section.behaviors h4 { color: var(--cyan); }
  .modal-section.coaching h4 { color: var(--gray-300); }

  .modal-section p {
    font-size: 0.88rem;
    color: var(--gray-300);
    line-height: 1.65;
  }

  .modal-section ul {
    list-style: none;
    padding: 0;
  }

  .modal-section ul li {
    font-size: 0.88rem;
    color: var(--gray-300);
    padding: 0.4rem 0;
    padding-left: 1.2rem;
    position: relative;
  }

  .modal-section ul li::before {
    content: 'â¢';
    color: var(--cyan);
    font-size: 0.45rem;
    position: absolute;
    left: 0;
    top: 0.7rem;
  }

  .modal-section .coaching-q {
    font-style: italic;
    font-size: 0.92rem;
    color: var(--gray-100);
    padding: 1rem;
    background: var(--dark-card);
    border-radius: 8px;
    border-left: 3px solid var(--gray-500);
  }

  /* ===== RATING ANCHORS PAGE ===== */
  .anchors-wrap { padding: 2rem 4rem; }

  .anchor-dim { margin-bottom: 2.5rem; }
  .anchor-dim h3 {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--cyan);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--dark-border);
  }

  .anchor-grid {
    display: grid;
    grid-template-columns: 90px 1fr 1fr 1fr;
    gap: 0.5rem;
  }

  .anchor-label {
    font-weight: 700;
    font-size: 0.82rem;
    color: var(--white);
    display: flex;
    align-items: center;
  }

  .anchor-cell {
    background: var(--dark-surface);
    border: 1px solid var(--dark-border);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    font-size: 0.8rem;
    line-height: 1.5;
    color: var(--gray-300);
  }

  .anchor-cell.r1 { border-left: 3px solid var(--orange); }
  .anchor-cell.r3 { border-left: 3px solid var(--yellow); }
  .anchor-cell.r5 { border-left: 3px solid var(--green); }

  .anchor-cell .rlabel {
    font-weight: 700;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    margin-bottom: 0.3rem;
  }

  .anchor-cell.r1 .rlabel { color: var(--orange); }
  .anchor-cell.r3 .rlabel { color: var(--yellow); }
  .anchor-cell.r5 .rlabel { color: var(--green); }

  /* Column headers for anchor grid */
  .anchor-col-header {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-align: center;
    padding: 0.5rem;
  }
  .anchor-col-header.c1 { color: var(--orange); }
  .anchor-col-header.c3 { color: var(--yellow); }
  .anchor-col-header.c5 { color: var(--green); }

  /* ===== BEHAVIORS PAGE ===== */
  .behaviors-wrap { padding: 2rem 4rem; }
  .behavior-dim { margin-bottom: 2.5rem; }
  .behavior-dim h3 {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--cyan);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--dark-border);
  }

  .behavior-level { margin-bottom: 1rem; }
  .behavior-level-name { font-weight: 700; font-size: 0.82rem; margin-bottom: 0.4rem; }

  .behavior-items { display: flex; flex-direction: column; gap: 0.4rem; }

  .behavior-item {
    background: var(--dark-surface);
    border: 1px solid var(--dark-border);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    font-size: 0.82rem;
    color: var(--gray-300);
    display: flex;
    align-items: flex-start;
    gap: 0.7rem;
  }
  .behavior-item::before {
    content: 'â¢';
    color: var(--cyan);
    font-size: 0.4rem;
    flex-shrink: 0;
    margin-top: 0.45rem;
  }

  /* ===== COACHING PAGE ===== */
  .coaching-wrap { padding: 2rem 4rem; }
  .coaching-dim { margin-bottom: 2.5rem; }
  .coaching-dim h3 {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--cyan);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--dark-border);
  }

  .coaching-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 0.75rem;
  }

  .coaching-card {
    background: var(--dark-surface);
    border: 1px solid var(--dark-border);
    border-radius: 10px;
    padding: 1.2rem;
  }

  .coaching-card .tag {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--cyan);
    margin-bottom: 0.6rem;
  }

  .coaching-card p {
    font-size: 0.88rem;
    color: var(--gray-300);
    line-height: 1.6;
    font-style: italic;
  }

  /* ===== LEVEL FILTER ===== */
  .level-filter {
    display: flex;
    gap: 0.5rem;
    padding: 1.2rem 4rem;
    background: var(--dark-surface);
    border-bottom: 1px solid var(--dark-border);
    align-items: center;
    flex-wrap: wrap;
  }
  .level-filter label {
    font-size: 0.72rem;

let currentSection = 'welcome';

// ===== INIT =====
window.addEventListener('DOMContentLoaded', init);
function init() {
  renderNav();
  showSection('welcome');
}

function renderNav() {
  const navTabs = document.getElementById('navTabs');
  const mobileMenu = document.getElementById('mobileMenu');
  navTabs.innerHTML = '';
  mobileMenu.innerHTML = '';
  SECTIONS.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-tab';
    btn.textContent = s.label;
    btn.onclick = () => { showSection(s.id); toggleMobileMenu(true); };
    navTabs.appendChild(btn);
    const btn2 = btn.cloneNode(true);
    btn2.onclick = btn.onclick;
    mobileMenu.appendChild(btn2);
  });
}

function toggleMobileMenu(close = false) {
  const menu = document.getElementById('mobileMenu');
  if (close || menu.classList.contains('open')) menu.classList.remove('open');
  else menu.classList.add('open');
}

function showSection(id) {
  currentSection = id;
  updateProgress();
  updateNav();
  updateArrows();
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  if (id === 'welcome') renderWelcome(main);
  else if (id === 'overview') renderOverview(main);
  else if (id === 'framework') renderFramework(main);
  else if (id === 'scope') renderScope(main);
  else if (id === 'grid') renderGrid(main);
  else if (id === 'anchors') renderAnchors(main);
  else if (id === 'behaviors') renderBehaviors(main);
  else if (id === 'coaching') renderCoaching(main);
  window.scrollTo(0, 0);
}

function updateNav() {
  const tabs = document.querySelectorAll('.nav-tab');
  const idx = SECTIONS.findIndex(s => s.id === currentSection);
  tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
}

function updateProgress() {
  const idx = SECTIONS.findIndex(s => s.id === currentSection);
  const pct = ((idx + 1) / SECTIONS.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

function updateArrows() {
  const idx = SECTIONS.findIndex(s => s.id === currentSection);
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === SECTIONS.length - 1;
}

function navPrev() {
  const idx = SECTIONS.findIndex(s => s.id === currentSection);
  if (idx > 0) showSection(SECTIONS[idx - 1].id);
}

function navNext() {
  const idx = SECTIONS.findIndex(s => s.id === currentSection);
  if (idx < SECTIONS.length - 1) showSection(SECTIONS[idx + 1].id);
}

function openGridModal(dimKey, level) {
  const dim = SCOPE[dimKey];
  const narrative = GRID[dimKey][level];
  const anchors = ANCHORS[dimKey].data[level];
  const behaviors = BEHAVIORS[dimKey][level] || {};
  const coachingQuestions = (COACHING[dimKey] || []).filter(q => q.tag === 'ALL LEVELS' || q.tag === level);
  
  const html = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3>${dim.name}</h3>
    <div class="modal-subtitle">${level} Level</div>
    
    <div class="modal-section">
      <h4>Meeting Expectations</h4>
      <p>${narrative}</p>
    </div>
    
    <div class="modal-section rating-1">
      <h4>Rating 1 - Developing</h4>
      <p>${anchors[1]}</p>
    </div>
    
    <div class="modal-section rating-3">
      <h4>Rating 3 - Meeting</h4>
      <p>${anchors[3]}</p>
    </div>
    
    <div class="modal-section rating-5">
      <h4>Rating 5 - Mastery</h4>
      <p>${anchors[5]}</p>
    </div>
    
    ${Object.keys(behaviors).length > 0 ? `
      <div class="modal-section behaviors">
        <h4>Key Behaviors</h4>
        <ul>
          ${Object.entries(behaviors).map(([b, d]) => `<li>${b}</li>`).join('')}
        </ul>
      </div>
    ` : ''}
    
    ${coachingQuestions.length > 0 ? `
      <div class="modal-section coaching">
        <h4>Reflection Questions</h4>
        ${coachingQuestions.map(q => `<div class="coaching-q">${q.q}</div>`).join('')}
      </div>
    ` : ''}
  `;
  
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalOverlay').classList.remove('open');
}
